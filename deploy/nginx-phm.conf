# =============================================================================
# PHM-ARCC : one domain, two apps
#   - Public website (static, built from phmwebsite/dist/client)  ->  "/"
#   - Django church system (Gunicorn)  ->  /members/ /dashboard/ /events/ ...
#
# Copy the BUILT site to the server:
#   local:  npm run build           (produces phmwebsite/dist/client)
#   upload: scp -r dist/client/*  user@server:/var/www/phmwebsite/
#
# Then put this file at /etc/nginx/sites-available/phm and:
#   sudo ln -s /etc/nginx/sites-available/phm /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# >>> EDIT the 3 placeholders marked with CHANGE_ME <<<
# =============================================================================

upstream church_django {
    server 127.0.0.1:8000;          # CHANGE_ME if Gunicorn uses a socket, e.g.:
    # server unix:/run/gunicorn.sock;
}

server {
    listen 80;
    server_name CHANGE_ME_yourdomain.com www.CHANGE_ME_yourdomain.com;

    # Root = the contents of phmwebsite/dist/client
    root /var/www/phmwebsite;
    index index.html;

    # ---- Public marketing website (served as static files) -------------------
    location = / {
        try_files /index.html =404;
    }
    location /about      { try_files $uri $uri/ /about/index.html; }
    location /our-events { try_files $uri $uri/ /our-events/index.html; }
    location /contact    { try_files $uri $uri/ /contact/index.html; }

    # Website assets (JS/CSS/images). Django uses /static/, so no clash.
    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 30d;
    }
    location /music/ {
        try_files $uri =404;
        access_log off;
        expires 30d;
    }

    # ---- Django static & media ----------------------------------------------
    location /static/ {
        alias /home/CHANGE_ME_user/church_system/church_management/staticfiles/;
    }
    location /media/ {
        alias /home/CHANGE_ME_user/church_system/church_management/media/;
    }

    # ---- Everything else -> Django ------------------------------------------
    # (login, dashboard, members, events, sermons, donations, admin, api, ...)
    location / {
        proxy_pass http://church_django;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
