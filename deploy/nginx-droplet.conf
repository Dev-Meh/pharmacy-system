upstream mehmedicore_api {
    server unix:/home/deploy/pharmacy-system/backend/gunicorn.sock fail_timeout=0;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 165.22.178.234;

    root /var/www/mehmedicore;
    index index.html;
    client_max_body_size 20M;

    location /api/ {
        proxy_pass http://mehmedicore_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://mehmedicore_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /home/deploy/pharmacy-system/backend/staticfiles/;
    }

    location /media/ {
        alias /home/deploy/pharmacy-system/backend/media/;
    }

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }
}
