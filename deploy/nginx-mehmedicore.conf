# MehMediCore Pharmacy — Nginx (DigitalOcean Droplet / Ubuntu VPS)
# Replace CHANGE_ME with your domain, Linux user, and paths before enabling.

upstream mehmedicore_api {
    server unix:/home/CHANGE_ME/mehmedicore/backend/gunicorn.sock fail_timeout=0;
}

server {
    listen 80;
    listen [::]:80;
    server_name CHANGE_ME.example.com;

    root /var/www/mehmedicore;
    index index.html;

    client_max_body_size 20M;

    # Prerendered static site — no /index.html fallback (avoids redirect loop)
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    location /assets/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Django API
    location /api/ {
        proxy_pass http://mehmedicore_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django admin (optional — restrict by IP in production if needed)
    location /admin/ {
        proxy_pass http://mehmedicore_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /home/CHANGE_ME/mehmedicore/backend/staticfiles/;
        expires 30d;
    }

    location /media/ {
        alias /home/CHANGE_ME/mehmedicore/backend/media/;
        expires 7d;
    }
}
